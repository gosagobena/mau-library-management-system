worker_processes auto;

events {
    worker_connections 1024;
}

http {
    sendfile      on;
    server_tokens off;

    # Rate limit auth endpoints to reduce brute-force risk (Section 3.7)
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    upstream web_upstream {
        server web:3000;
    }

    upstream api_upstream {
        server api:8080;
    }

    server {
        listen 80;
        server_name _;

        # API routes → ASP.NET Core container
        location /api/ {
            proxy_pass         http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /api/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass         http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Everything else → Next.js container
        location / {
            proxy_pass         http://web_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # HTTPS server — uncomment once certificates are mounted at ./nginx/certs
    # server {
    #     listen 443 ssl;
    #     server_name library.mau.edu.et;
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     # ...same location blocks as above...
    # }
}
