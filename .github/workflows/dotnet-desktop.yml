name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x

      - name: Restore API
        run: dotnet restore api/LibrarySystem.Api.csproj

      - name: Build API
        run: dotnet build api/LibrarySystem.Api.csproj --no-restore

      - name: Run API tests
        run: dotnet test tests/LibrarySystem.Api.Tests/LibrarySystem.Api.Tests.csproj --no-restore
